<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDCHM Containment Graph</title>

<!-- Cytoscape + dagre layout -->
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>

<style>
  :root {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --border: #d0d5dd;
    --text: #1a1a2e;
    --text-muted: #5f6b7a;
    --accent: #1a73c7;
    --node-bg: #dce8f5;
    --node-border: #1a73c7;
    --node-abstract-bg: #e8d5f5;
    --node-abstract-border: #7b2d8e;
    --edge-has-a: #2c3e50;
    --edge-subclass: #1a8a3a;
    --edge-flipped: #b33dc6;
    --edge-highlight: #0d5baf;
    --edge-highlight-in: #d4830a;
  }

  [data-theme="dark"] {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #334;
    --text: #e0e0e0;
    --text-muted: #8892a8;
    --accent: #4fc3f7;
    --node-bg: #1e3a5f;
    --node-border: #4fc3f7;
    --node-abstract-bg: #3a1e5a;
    --node-abstract-border: #ce93d8;
    --edge-has-a: #b0bec5;
    --edge-subclass: #66bb6a;
    --edge-flipped: #e040fb;
    --edge-highlight: #4fc3f7;
    --edge-highlight-in: #ffcc80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .app { display: flex; flex-direction: column; height: 100vh; }

  header {
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  h1 { font-size: 1.1rem; font-weight: 600; color: var(--accent); margin-right: 8px; }
  .subtitle { color: var(--text-muted); font-size: 0.82rem; }

  .controls { display: flex; gap: 8px; align-items: center; margin-left: auto; }

  .control-group {
    display: flex; gap: 4px; align-items: center;
    font-size: 0.78rem; color: var(--text-muted);
  }
  .control-group label { white-space: nowrap; }

  .btn {
    padding: 4px 10px; border: 1px solid var(--border); border-radius: 4px;
    background: var(--surface); color: var(--text); font-size: 0.78rem; cursor: pointer;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.active { background: var(--accent); color: var(--surface); border-color: var(--accent); }

  select {
    padding: 3px 6px; border: 1px solid var(--border); border-radius: 4px;
    background: var(--surface); color: var(--text); font-size: 0.78rem;
  }

  .legend {
    padding: 6px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 0.75rem;
    color: var(--text-muted);
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-edge { width: 24px; height: 2px; }
  .legend-edge.dashed { border-top: 2px dashed; height: 0; }

  .stats { margin-left: auto; font-size: 0.78rem; }

  #cy { flex: 1; min-height: 0; background: var(--bg); }

  /* Info panel */
  .info-panel {
    position: absolute; top: 110px; right: 20px; width: 340px;
    max-height: calc(100vh - 140px); overflow-y: auto;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: 12px 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    font-size: 0.82rem; display: none; z-index: 10;
  }
  .info-panel.visible { display: block; }
  .info-panel h2 { font-size: 0.95rem; font-weight: 600; color: var(--accent); margin-bottom: 4px; }
  .info-panel .desc { color: var(--text-muted); font-size: 0.78rem; margin-bottom: 10px; line-height: 1.4; }
  .info-panel .section-label {
    font-size: 0.7rem; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px; margin-top: 10px; margin-bottom: 4px;
  }
  .info-panel ul { list-style: none; margin-bottom: 8px; }
  .info-panel li { padding: 2px 0; font-size: 0.78rem; }
  .info-panel .clickable {
    color: var(--accent); cursor: pointer;
    font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.75rem;
  }
  .info-panel .clickable:hover { text-decoration: underline; }
  .info-panel .card-label { font-size: 0.72rem; color: var(--text-muted); }
  .info-panel .close {
    float: right; background: none; border: none;
    color: var(--text-muted); cursor: pointer; font-size: 1rem;
  }
  .info-panel .close:hover { color: var(--text); }
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>BDCHM Containment Graph</h1>
    <span class="subtitle">Has-a and is-a relationships — FK edges inverted for containment</span>
    <div class="controls">
      <div class="control-group">
        <label>Layout:</label>
        <select id="layout-select">
          <option value="dagre-TB" selected>Dagre (top-down)</option>
          <option value="dagre-LR">Dagre (left-right)</option>
          <option value="cose">Cose (force)</option>
        </select>
      </div>
      <div class="control-group">
        <label>Labels:</label>
        <button class="btn" id="labels-all">All</button>
        <button class="btn active" id="labels-hover">Hover</button>
        <button class="btn" id="labels-none">None</button>
      </div>
      <div class="control-group">
        <label>Show:</label>
        <button class="btn active" id="show-has-a">has-a</button>
        <button class="btn active" id="show-subclass">is-a</button>
      </div>
      <div class="control-group">
        <button class="btn" id="fit-btn">Fit</button>
        <button class="btn" id="theme-btn">Dark</button>
      </div>
    </div>
  </header>
  <div class="legend">
    <div class="legend-item"><span class="legend-edge" style="background:var(--edge-has-a)"></span> has-a</div>
    <div class="legend-item"><span class="legend-edge" style="background:var(--edge-flipped)"></span> has-a (flipped FK)</div>
    <div class="legend-item"><span class="legend-edge dashed" style="border-color:var(--edge-subclass)"></span> is-a (subclass)</div>
    <div class="legend-item" style="gap:3px">
      <span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:var(--node-bg);border:1px solid var(--node-border)"></span> concrete
    </div>
    <div class="legend-item" style="gap:3px">
      <span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:var(--node-abstract-bg);border:1px solid var(--node-abstract-border)"></span> abstract
    </div>
    <div class="stats" id="stats">loading…</div>
  </div>
  <div id="cy"></div>
  <div class="info-panel" id="info-panel">
    <button class="close" id="info-close">&#x2715;</button>
    <h2 id="info-name"></h2>
    <div class="desc" id="info-desc"></div>
    <div id="info-sections"></div>
  </div>
</div>

<script>
(async function() {
  cytoscape.use(cytoscapeDagre);

  const resp = await fetch('./containment-graph.json');
  const data = await resp.json();

  document.getElementById('stats').textContent =
    `${data.nodes.length} classes, ${data.edges.length} edges`;

  const elements = [
    ...data.nodes.map(n => ({ data: { ...n } })),
    ...data.edges.map(e => ({
      data: {
        ...e,
        displayLabel: e.kind === 'subclass'
          ? 'is-a'
          : e.label + (e.cardinality ? ` (${e.cardinality})` : ''),
      }
    })),
  ];

  // Build indexes for info panel
  const outgoing = {}, incoming = {}, subclassOf = {}, subclasses = {};
  for (const e of data.edges) {
    if (e.kind === 'subclass') {
      (subclasses[e.source] ||= []).push(e);
      subclassOf[e.target] = e.source;
    } else {
      (outgoing[e.source] ||= []).push(e);
      (incoming[e.target] ||= []).push(e);
    }
  }

  let labelMode = 'hover';
  let showHasA = true;
  let showSubclass = true;

  function getCss(v) {
    return getComputedStyle(document.documentElement).getPropertyValue(v).trim();
  }

  function buildStyle() {
    return [
      {
        selector: 'node',
        style: {
          'label': 'data(label)',
          'background-color': ele => ele.data('abstract') ? getCss('--node-abstract-bg') : getCss('--node-bg'),
          'border-color': ele => ele.data('abstract') ? getCss('--node-abstract-border') : getCss('--node-border'),
          'border-width': 1.5,
          'color': getCss('--text'),
          'font-size': '14px',
          'font-weight': 500,
          'text-valign': 'center',
          'text-halign': 'center',
          'shape': 'round-rectangle',
          'width': ele => Math.max(70, ele.data('label').length * 9),
          'height': 32,
          'padding': '8px',
          'text-max-width': '200px',
          'text-wrap': 'wrap',
        }
      },
      {
        selector: 'node:selected',
        style: {
          'border-width': 3,
          'border-color': getCss('--accent'),
        }
      },
      // has-a edges (not flipped)
      {
        selector: 'edge[kind = "has-a"][!flipped]',
        style: {
          'width': 1.4,
          'curve-style': 'bezier',
          'control-point-step-size': 40,
          'line-color': getCss('--edge-has-a'),
          'target-arrow-color': getCss('--edge-has-a'),
          'target-arrow-shape': 'vee',
          'arrow-scale': 0.8,
          'opacity': 0.7,
          'font-size': '11px',
          'color': getCss('--text-muted'),
          'text-background-color': getCss('--surface'),
          'text-background-opacity': 0.85,
          'text-background-padding': '2px',
          'text-rotation': 'autorotate',
          'label': ele => {
            if (labelMode === 'all') return ele.data('displayLabel');
            if (labelMode === 'hover' && (ele.hasClass('hl-out') || ele.hasClass('hl-in')))
              return ele.data('displayLabel');
            return '';
          },
        }
      },
      // has-a edges (flipped)
      {
        selector: 'edge[kind = "has-a"][?flipped]',
        style: {
          'width': 1.4,
          'curve-style': 'bezier',
          'control-point-step-size': 40,
          'line-color': getCss('--edge-flipped'),
          'target-arrow-color': getCss('--edge-flipped'),
          'target-arrow-shape': 'vee',
          'arrow-scale': 0.8,
          'opacity': 0.55,
          'font-size': '11px',
          'color': getCss('--edge-flipped'),
          'text-background-color': getCss('--surface'),
          'text-background-opacity': 0.85,
          'text-background-padding': '2px',
          'text-rotation': 'autorotate',
          'label': ele => {
            if (labelMode === 'all') return ele.data('displayLabel');
            if (labelMode === 'hover' && (ele.hasClass('hl-out') || ele.hasClass('hl-in')))
              return ele.data('displayLabel');
            return '';
          },
        }
      },
      // subclass edges
      {
        selector: 'edge[kind = "subclass"]',
        style: {
          'width': 1.2,
          'curve-style': 'bezier',
          'control-point-step-size': 40,
          'line-style': 'dashed',
          'line-dash-pattern': [6, 4],
          'line-color': getCss('--edge-subclass'),
          'target-arrow-color': getCss('--edge-subclass'),
          'target-arrow-shape': 'triangle',
          'arrow-scale': 0.7,
          'opacity': 0.5,
          'font-size': '11px',
          'color': getCss('--edge-subclass'),
          'text-background-color': getCss('--surface'),
          'text-background-opacity': 0.85,
          'text-background-padding': '2px',
          'text-rotation': 'autorotate',
          'label': ele => {
            if (labelMode === 'all') return 'is-a';
            if (labelMode === 'hover' && (ele.hasClass('hl-out') || ele.hasClass('hl-in')))
              return 'is-a';
            return '';
          },
        }
      },
      // highlighted outgoing
      {
        selector: 'edge.hl-out',
        style: {
          'width': 2.5,
          'line-color': getCss('--edge-highlight'),
          'target-arrow-color': getCss('--edge-highlight'),
          'opacity': 1,
          'z-index': 10,
          'label': 'data(displayLabel)',
          'color': getCss('--edge-highlight'),
          'font-weight': 600,
        }
      },
      // highlighted incoming
      {
        selector: 'edge.hl-in',
        style: {
          'width': 2.5,
          'line-color': getCss('--edge-highlight-in'),
          'target-arrow-color': getCss('--edge-highlight-in'),
          'opacity': 1,
          'z-index': 10,
          'label': 'data(displayLabel)',
          'color': getCss('--edge-highlight-in'),
          'font-weight': 600,
        }
      },
      {
        selector: 'node.faded, edge.faded',
        style: { 'opacity': 0.12 }
      },
      {
        selector: 'edge.hidden-kind',
        style: { 'display': 'none' }
      },
    ];
  }

  const cy = cytoscape({
    container: document.getElementById('cy'),
    elements,
    style: buildStyle(),
    wheelSensitivity: 0.3,
    layout: dagreOpts('TB'),
  });

  function dagreOpts(dir) {
    return {
      name: 'dagre',
      rankDir: dir,
      nodeSep: 35,
      edgeSep: 15,
      rankSep: 80,
      animate: false,
      fit: true,
      padding: 30,
    };
  }

  function runLayout(name) {
    let opts;
    if (name === 'dagre-TB') opts = dagreOpts('TB');
    else if (name === 'dagre-LR') opts = dagreOpts('LR');
    else if (name === 'cose') {
      opts = {
        name: 'cose', animate: false, fit: true, padding: 30,
        nodeRepulsion: 8000, idealEdgeLength: 100, gravity: 0.25,
      };
    }
    cy.layout(opts).run();
  }

  // --- Interactions ---
  cy.on('tap', 'node', evt => selectNode(evt.target.id()));

  cy.on('tap', evt => {
    if (evt.target === cy) clearSelection();
  });

  // Hover on node: highlight connected edges (shows labels in hover mode)
  let hoverLocked = false; // true when a node is tap-selected

  cy.on('mouseover', 'node', evt => {
    if (hoverLocked) return;
    const node = evt.target;
    cy.elements().addClass('faded');
    node.removeClass('faded');
    const outEdges = node.outgoers('edge');
    const inEdges = node.incomers('edge');
    const neighborhood = node
      .union(outEdges).union(outEdges.targets())
      .union(inEdges).union(inEdges.sources());
    neighborhood.removeClass('faded');
    outEdges.addClass('hl-out');
    inEdges.addClass('hl-in');
  });

  cy.on('mouseout', 'node', () => {
    if (hoverLocked) return;
    cy.elements().removeClass('faded hl-out hl-in');
  });

  // Hover on edge: show its label
  cy.on('mouseover', 'edge', evt => {
    if (hoverLocked) return;
    evt.target.addClass('hl-out');
  });

  cy.on('mouseout', 'edge', evt => {
    if (hoverLocked) return;
    evt.target.removeClass('hl-out');
  });

  function selectNode(id) {
    hoverLocked = true;
    const node = cy.getElementById(id);
    if (!node || node.length === 0) return;
    cy.elements().removeClass('faded hl-out hl-in');
    cy.elements().addClass('faded');
    node.removeClass('faded');

    const outEdges = node.outgoers('edge');
    const inEdges = node.incomers('edge');
    const neighborhood = node
      .union(outEdges).union(outEdges.targets())
      .union(inEdges).union(inEdges.sources());
    neighborhood.removeClass('faded');
    outEdges.addClass('hl-out');
    inEdges.addClass('hl-in');
    node.select();
    showInfoPanel(id);
  }

  function clearSelection() {
    hoverLocked = false;
    cy.elements().removeClass('faded hl-out hl-in');
    cy.nodes().unselect();
    document.getElementById('info-panel').classList.remove('visible');
  }

  function showInfoPanel(id) {
    const nodeData = data.nodes.find(n => n.id === id);
    const panel = document.getElementById('info-panel');
    document.getElementById('info-name').textContent =
      id + (nodeData.abstract ? ' (abstract)' : '');
    document.getElementById('info-desc').textContent = nodeData.description || '';

    const sections = document.getElementById('info-sections');
    sections.innerHTML = '';

    function addSection(label, items) {
      if (!items || items.length === 0) return;
      const lbl = document.createElement('div');
      lbl.className = 'section-label';
      lbl.textContent = label;
      sections.appendChild(lbl);
      const ul = document.createElement('ul');
      for (const item of items) {
        const li = document.createElement('li');
        li.innerHTML = item;
        ul.appendChild(li);
      }
      sections.appendChild(ul);
    }

    // Has-a children (outgoing)
    const outs = (outgoing[id] || []).sort((a, b) => a.label.localeCompare(b.label));
    addSection('Contains (has-a)', outs.map(e => {
      const flip = e.flipped ? ' <span class="card-label">[flipped]</span>' : '';
      return `<span class="clickable" data-id="${e.target}">${e.target}</span>` +
        ` <span class="card-label">via ${e.label} (${e.cardinality})</span>${flip}`;
    }));

    // Has-a parents (incoming)
    const ins = (incoming[id] || []).sort((a, b) => a.source.localeCompare(b.source));
    addSection('Contained by', ins.map(e => {
      const flip = e.flipped ? ' <span class="card-label">[flipped]</span>' : '';
      return `<span class="clickable" data-id="${e.source}">${e.source}</span>` +
        ` <span class="card-label">via ${e.label} (${e.cardinality})</span>${flip}`;
    }));

    // Subclasses
    const subs = (subclasses[id] || []).sort((a, b) => a.target.localeCompare(b.target));
    addSection('Subclasses (is-a)', subs.map(e =>
      `<span class="clickable" data-id="${e.target}">${e.target}</span>`
    ));

    // Parent class
    if (subclassOf[id]) {
      addSection('Parent class', [
        `<span class="clickable" data-id="${subclassOf[id]}">${subclassOf[id]}</span>`
      ]);
    }

    // No sections at all
    if (sections.children.length === 0) {
      sections.innerHTML = '<div class="card-label" style="margin-top:8px">(no containment relationships)</div>';
    }

    panel.classList.add('visible');

    panel.querySelectorAll('.clickable').forEach(el => {
      el.addEventListener('click', () => {
        const tgt = el.dataset.id;
        if (tgt) selectNode(tgt);
      });
    });
  }

  document.getElementById('info-close').addEventListener('click', clearSelection);

  // --- Controls ---
  document.getElementById('layout-select').addEventListener('change', e => {
    runLayout(e.target.value);
  });

  document.getElementById('fit-btn').addEventListener('click', () => cy.fit(undefined, 30));

  function setLabelMode(mode) {
    labelMode = mode;
    ['labels-all', 'labels-hover', 'labels-none'].forEach(id => {
      document.getElementById(id).classList.toggle('active', id === `labels-${mode}`);
    });
    cy.style().fromJson(buildStyle()).update();
  }
  document.getElementById('labels-all').addEventListener('click', () => setLabelMode('all'));
  document.getElementById('labels-hover').addEventListener('click', () => setLabelMode('hover'));
  document.getElementById('labels-none').addEventListener('click', () => setLabelMode('none'));

  function updateEdgeVisibility() {
    cy.edges().forEach(edge => {
      const kind = edge.data('kind');
      const hidden = (kind === 'has-a' && !showHasA) || (kind === 'subclass' && !showSubclass);
      edge.toggleClass('hidden-kind', hidden);
    });
  }

  document.getElementById('show-has-a').addEventListener('click', () => {
    showHasA = !showHasA;
    document.getElementById('show-has-a').classList.toggle('active', showHasA);
    updateEdgeVisibility();
  });

  document.getElementById('show-subclass').addEventListener('click', () => {
    showSubclass = !showSubclass;
    document.getElementById('show-subclass').classList.toggle('active', showSubclass);
    updateEdgeVisibility();
  });

  document.getElementById('theme-btn').addEventListener('click', () => {
    const html = document.documentElement;
    const btn = document.getElementById('theme-btn');
    if (html.getAttribute('data-theme') === 'dark') {
      html.removeAttribute('data-theme');
      btn.textContent = 'Dark';
    } else {
      html.setAttribute('data-theme', 'dark');
      btn.textContent = 'Light';
    }
    cy.style().fromJson(buildStyle()).update();
  });
})();
</script>

</body>
</html>
