<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDCHM has-a graph</title>

<!-- Cytoscape + dagre layout -->
<script src="https://cdn.jsdelivr.net/npm/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/cytoscape-dagre@2.5.0/cytoscape-dagre.min.js"></script>

<style>
  :root {
    --bg: #f5f6f8;
    --surface: #ffffff;
    --border: #d0d5dd;
    --text: #1a1a2e;
    --text-muted: #5f6b7a;
    --accent: #1a73c7;
    --accent-dim: #b3d4f7;
    --node-bg: #e6eff9;
    --node-border: #1a73c7;
    --node-abstract-bg: #f0e6ff;
    --node-abstract-border: #8e44ad;
    --edge: #9aa5b4;
    --edge-inherited: #d0d5dd;
    --edge-highlight: #1a73c7;
    --edge-highlight-incoming: #c27a0a;
  }

  [data-theme="dark"] {
    --bg: #1a1a2e;
    --surface: #16213e;
    --border: #334;
    --text: #e0e0e0;
    --text-muted: #8892a8;
    --accent: #4fc3f7;
    --accent-dim: #2a6e8e;
    --node-bg: #1e3a5f;
    --node-border: #4fc3f7;
    --node-abstract-bg: #3a1e5a;
    --node-abstract-border: #ce93d8;
    --edge: #6a7588;
    --edge-inherited: #334;
    --edge-highlight: #4fc3f7;
    --edge-highlight-incoming: #ffcc80;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  header {
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--accent);
    margin-right: 8px;
  }

  .subtitle {
    color: var(--text-muted);
    font-size: 0.82rem;
  }

  .controls {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-left: auto;
  }

  .control-group {
    display: flex;
    gap: 4px;
    align-items: center;
    font-size: 0.78rem;
    color: var(--text-muted);
  }

  .control-group label {
    white-space: nowrap;
  }

  .btn {
    padding: 4px 10px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.78rem;
    cursor: pointer;
  }
  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .btn.active {
    background: var(--accent);
    color: var(--surface);
    border-color: var(--accent);
  }

  select {
    padding: 3px 6px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    color: var(--text);
    font-size: 0.78rem;
  }

  .legend {
    padding: 6px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
    color: var(--text-muted);
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    align-items: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .legend-swatch {
    width: 18px;
    height: 12px;
    border-radius: 3px;
    border: 1px solid var(--border);
  }

  .legend-edge {
    width: 24px;
    height: 2px;
    background: var(--edge);
  }
  .legend-edge.inherited {
    background: var(--edge-inherited);
  }

  .stats {
    margin-left: auto;
    color: var(--text-muted);
    font-size: 0.78rem;
  }

  #cy {
    flex: 1;
    min-height: 0;
    background: var(--bg);
  }

  .info-panel {
    position: absolute;
    top: 110px;
    right: 20px;
    width: 340px;
    max-height: calc(100vh - 140px);
    overflow-y: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    font-size: 0.82rem;
    display: none;
    z-index: 10;
  }

  .info-panel.visible { display: block; }

  .info-panel h2 {
    font-size: 0.95rem;
    font-weight: 600;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .info-panel .desc {
    color: var(--text-muted);
    font-size: 0.78rem;
    margin-bottom: 10px;
    line-height: 1.4;
  }
  .info-panel .section-label {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 10px;
    margin-bottom: 4px;
  }
  .info-panel ul {
    list-style: none;
    margin-bottom: 8px;
  }
  .info-panel li {
    padding: 2px 0;
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.75rem;
  }
  .info-panel .slot-name {
    color: var(--accent);
    cursor: pointer;
  }
  .info-panel .cardinality {
    color: var(--text-muted);
    font-size: 0.7rem;
  }
  .info-panel .close {
    float: right;
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 1rem;
  }
  .info-panel .close:hover { color: var(--text); }

  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  /* Edge-label visibility is controlled by the style() function against edge data */
</style>
</head>
<body>

<div class="app">
  <header>
    <h1>BDCHM has-a graph</h1>
    <span class="subtitle">Classes connected by slot-range (composition) relationships</span>
    <div class="controls">
      <div class="control-group">
        <label>Layout:</label>
        <select id="layout-select">
          <option value="dagre-LR" selected>Dagre (left→right)</option>
          <option value="dagre-TB">Dagre (top→bottom)</option>
          <option value="cose">Cose (force)</option>
          <option value="circle">Circle</option>
          <option value="concentric">Concentric</option>
        </select>
      </div>
      <div class="control-group">
        <label>Edge labels:</label>
        <button class="btn active" id="labels-all" title="Show all slot names on edges">All</button>
        <button class="btn" id="labels-hover" title="Only show labels on hover/selection">Hover</button>
        <button class="btn" id="labels-none" title="Hide slot names">None</button>
      </div>
      <div class="control-group">
        <button class="btn" id="fit-btn" title="Fit graph to screen">Fit</button>
      </div>
      <div class="control-group">
        <button class="btn" id="theme-btn" title="Toggle dark mode">Dark</button>
      </div>
    </div>
  </header>
  <div class="legend">
    <div class="legend-item"><span class="legend-swatch" style="background:var(--node-bg); border-color:var(--node-border)"></span> concrete class</div>
    <div class="legend-item"><span class="legend-swatch" style="background:var(--node-abstract-bg); border-color:var(--node-abstract-border)"></span> abstract class</div>
    <div class="legend-item"><span class="legend-edge"></span> defined here</div>
    <div class="legend-item"><span class="legend-edge inherited"></span> inherited slot</div>
    <div class="legend-item">edge label: <code style="background:rgba(0,0,0,0.06);padding:1px 4px;border-radius:3px">slot_name (cardinality)</code></div>
    <div class="stats" id="stats">loading…</div>
  </div>
  <div id="cy"><div class="loading">Loading graph…</div></div>
  <div class="info-panel" id="info-panel">
    <button class="close" id="info-close">&#x2715;</button>
    <h2 id="info-name"></h2>
    <div class="desc" id="info-desc"></div>
    <div class="section-label">has-a (outgoing)</div>
    <ul id="info-outgoing"></ul>
    <div class="section-label">referenced by (incoming)</div>
    <ul id="info-incoming"></ul>
  </div>
</div>

<script>
(async function() {
  cytoscape.use(cytoscapeDagre);

  const resp = await fetch('./has-a-graph.json');
  const data = await resp.json();

  // Clear the "Loading..." placeholder so cytoscape has a clean container
  document.getElementById('cy').innerHTML = '';

  document.getElementById('stats').textContent =
    `${data.nodes.length} classes, ${data.edges.length} has-a edges`;

  // Map to cytoscape elements
  const elements = [
    ...data.nodes.map(n => ({
      data: {
        id: n.id,
        label: n.label,
        abstract: n.abstract,
        description: n.description,
      }
    })),
    ...data.edges.map(e => ({
      data: {
        id: e.id,
        source: e.source,
        target: e.target,
        label: e.label,
        cardinality: e.cardinality,
        multivalued: e.multivalued,
        inherited: e.inherited,
        isLoop: e.source === e.target,
        displayLabel: `${e.label} (${e.cardinality})`,
      }
    })),
  ];

  // Build outgoing/incoming indexes for the info panel
  const outgoing = {};
  const incoming = {};
  for (const e of data.edges) {
    (outgoing[e.source] ||= []).push(e);
    (incoming[e.target] ||= []).push(e);
  }

  let labelMode = 'all'; // 'all' | 'hover' | 'none'

  function buildStyle() {
    return [
      {
        selector: 'node',
        style: {
          'label': 'data(label)',
          'background-color': function(ele) {
            return ele.data('abstract')
              ? getCss('--node-abstract-bg')
              : getCss('--node-bg');
          },
          'border-color': function(ele) {
            return ele.data('abstract')
              ? getCss('--node-abstract-border')
              : getCss('--node-border');
          },
          'border-width': 1.5,
          'color': getCss('--text'),
          'font-size': '11px',
          'font-weight': 500,
          'text-valign': 'center',
          'text-halign': 'center',
          'shape': 'round-rectangle',
          'width': function(ele) {
            // approximate: 7px per char, min 60
            return Math.max(60, ele.data('label').length * 7);
          },
          'height': 26,
          'padding': '6px',
          'text-max-width': '160px',
          'text-wrap': 'wrap',
        }
      },
      {
        selector: 'node:selected',
        style: {
          'border-width': 3,
          'border-color': getCss('--accent'),
        }
      },
      {
        selector: 'edge',
        style: {
          'width': 1.2,
          'curve-style': 'bezier',
          'control-point-step-size': 40,
          'line-color': function(ele) {
            return ele.data('inherited') ? getCss('--edge-inherited') : getCss('--edge');
          },
          'target-arrow-color': function(ele) {
            return ele.data('inherited') ? getCss('--edge-inherited') : getCss('--edge');
          },
          'target-arrow-shape': 'vee',
          'arrow-scale': 0.8,
          'opacity': function(ele) {
            return ele.data('inherited') ? 0.5 : 0.85;
          },
          'font-size': '9px',
          'color': getCss('--text-muted'),
          'text-background-color': getCss('--surface'),
          'text-background-opacity': 0.85,
          'text-background-padding': '2px',
          'text-rotation': 'autorotate',
          'label': function(ele) {
            if (labelMode === 'all') return ele.data('displayLabel');
            if (labelMode === 'hover' && (ele.hasClass('highlighted-out') || ele.hasClass('highlighted-in'))) {
              return ele.data('displayLabel');
            }
            return '';
          },
        }
      },
      {
        selector: 'edge[?isLoop]',
        style: {
          'curve-style': 'bezier',
          'control-point-step-size': 60,
          'loop-direction': '-45deg',
          'loop-sweep': '-90deg',
        }
      },
      {
        selector: 'edge.highlighted-out',
        style: {
          'width': 2.5,
          'line-color': getCss('--edge-highlight'),
          'target-arrow-color': getCss('--edge-highlight'),
          'opacity': 1,
          'z-index': 10,
          'label': 'data(displayLabel)',
          'color': getCss('--edge-highlight'),
          'font-weight': 600,
        }
      },
      {
        selector: 'edge.highlighted-in',
        style: {
          'width': 2.5,
          'line-color': getCss('--edge-highlight-incoming'),
          'target-arrow-color': getCss('--edge-highlight-incoming'),
          'opacity': 1,
          'z-index': 10,
          'label': 'data(displayLabel)',
          'color': getCss('--edge-highlight-incoming'),
          'font-weight': 600,
        }
      },
      {
        selector: 'node.faded, edge.faded',
        style: {
          'opacity': 0.15,
        }
      },
    ];
  }

  const cy = cytoscape({
    container: document.getElementById('cy'),
    elements,
    style: buildStyle(),
    wheelSensitivity: 0.2,
    layout: dagreOpts('LR'),
  });

  // ----- Layout options -----
  function dagreOpts(rank) {
    return {
      name: 'dagre',
      rankDir: rank, // LR or TB
      nodeSep: 30,
      edgeSep: 15,
      rankSep: 80,
      animate: false,
      fit: true,
      padding: 30,
    };
  }

  function runLayout(name) {
    let opts;
    if (name === 'dagre-LR') opts = dagreOpts('LR');
    else if (name === 'dagre-TB') opts = dagreOpts('TB');
    else if (name === 'cose') {
      opts = {
        name: 'cose',
        animate: false,
        fit: true,
        padding: 30,
        nodeRepulsion: 8000,
        idealEdgeLength: 120,
        gravity: 0.25,
      };
    } else if (name === 'circle') {
      opts = { name: 'circle', animate: false, fit: true, padding: 30 };
    } else if (name === 'concentric') {
      opts = {
        name: 'concentric',
        animate: false,
        fit: true,
        padding: 30,
        concentric: function(node) {
          return (incoming[node.id()] || []).length;
        },
        levelWidth: function() { return 4; },
      };
    }
    cy.layout(opts).run();
  }

  // ----- Interactions -----
  cy.on('tap', 'node', evt => {
    const node = evt.target;
    selectNode(node.id());
  });

  cy.on('tap', (evt) => {
    if (evt.target === cy) {
      cy.elements().removeClass('faded highlighted-out highlighted-in');
      document.getElementById('info-panel').classList.remove('visible');
      cy.nodes().unselect();
    }
  });

  function selectNode(id) {
    const node = cy.getElementById(id);
    if (!node || node.length === 0) return;
    cy.elements().removeClass('faded highlighted-out highlighted-in');
    cy.elements().addClass('faded');
    node.removeClass('faded');

    const outEdges = node.outgoers('edge');
    const inEdges = node.incomers('edge');
    const neighborhood = node.union(outEdges).union(outEdges.targets()).union(inEdges).union(inEdges.sources());
    neighborhood.removeClass('faded');
    outEdges.addClass('highlighted-out');
    inEdges.addClass('highlighted-in');

    node.select();
    showInfoPanel(id);
  }

  function showInfoPanel(id) {
    const nodeData = data.nodes.find(n => n.id === id);
    const panel = document.getElementById('info-panel');
    document.getElementById('info-name').textContent = id + (nodeData.abstract ? ' (abstract)' : '');
    document.getElementById('info-desc').textContent = nodeData.description || '';

    const outgoingList = document.getElementById('info-outgoing');
    outgoingList.innerHTML = '';
    const outs = (outgoing[id] || []).slice().sort((a, b) => a.label.localeCompare(b.label));
    if (outs.length === 0) outgoingList.innerHTML = '<li style="color:var(--text-muted); font-family:inherit; font-style:italic">(none)</li>';
    for (const e of outs) {
      const li = document.createElement('li');
      const inh = e.inherited ? ' <span style="color:var(--text-muted);font-size:0.68rem">[inherited]</span>' : '';
      li.innerHTML = `<span class="slot-name" data-target="${e.target}">${e.label}</span> <span class="cardinality">(${e.cardinality})</span> &rarr; <span class="slot-name" data-target="${e.target}">${e.target}</span>${inh}`;
      outgoingList.appendChild(li);
    }

    const incomingList = document.getElementById('info-incoming');
    incomingList.innerHTML = '';
    const ins = (incoming[id] || []).slice().sort((a, b) => a.source.localeCompare(b.source));
    if (ins.length === 0) incomingList.innerHTML = '<li style="color:var(--text-muted); font-family:inherit; font-style:italic">(none)</li>';
    for (const e of ins) {
      const li = document.createElement('li');
      const inh = e.inherited ? ' <span style="color:var(--text-muted);font-size:0.68rem">[inherited]</span>' : '';
      li.innerHTML = `<span class="slot-name" data-target="${e.source}">${e.source}</span>.${e.label} <span class="cardinality">(${e.cardinality})</span>${inh}`;
      incomingList.appendChild(li);
    }

    panel.classList.add('visible');

    panel.querySelectorAll('.slot-name').forEach(el => {
      el.addEventListener('click', () => {
        const tgt = el.dataset.target;
        if (tgt) selectNode(tgt);
      });
    });
  }

  document.getElementById('info-close').addEventListener('click', () => {
    document.getElementById('info-panel').classList.remove('visible');
    cy.elements().removeClass('faded highlighted-out highlighted-in');
    cy.nodes().unselect();
  });

  // ----- Controls -----
  document.getElementById('layout-select').addEventListener('change', e => {
    runLayout(e.target.value);
  });

  document.getElementById('fit-btn').addEventListener('click', () => {
    cy.fit(undefined, 30);
  });

  function setLabelMode(mode) {
    labelMode = mode;
    ['labels-all', 'labels-hover', 'labels-none'].forEach(id => {
      document.getElementById(id).classList.toggle('active', id === `labels-${mode}`);
    });
    // Rebuild styles so the edge label function picks up the new mode
    cy.style().fromJson(buildStyle()).update();
  }

  document.getElementById('labels-all').addEventListener('click', () => setLabelMode('all'));
  document.getElementById('labels-hover').addEventListener('click', () => setLabelMode('hover'));
  document.getElementById('labels-none').addEventListener('click', () => setLabelMode('none'));

  document.getElementById('theme-btn').addEventListener('click', () => {
    const html = document.documentElement;
    const btn = document.getElementById('theme-btn');
    if (html.getAttribute('data-theme') === 'dark') {
      html.removeAttribute('data-theme');
      btn.textContent = 'Dark';
    } else {
      html.setAttribute('data-theme', 'dark');
      btn.textContent = 'Light';
    }
    // Rebuild cytoscape styles so functions re-read CSS variables
    cy.style().fromJson(buildStyle()).update();
  });

  function getCss(varName) {
    return getComputedStyle(document.documentElement).getPropertyValue(varName).trim();
  }
})();
</script>

</body>
</html>
